<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Mặt Trời – Mô phỏng Quỹ Đạo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #020210;
            color: #e0e0f0;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            height: 100vh
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 28px;
            background: linear-gradient(180deg, rgba(2, 2, 16, .92) 60%, transparent);
            z-index: 20;
            pointer-events: none
        }

        .topbar>* {
            pointer-events: auto
        }

        .topbar h1 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffd700, #ff8c00, #ff4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .info-panel {
            position: fixed;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            background: rgba(2, 2, 16, .8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, .1);
            border-radius: 16px;
            padding: 16px;
            width: 210px;
            font-size: .72rem;
            color: #8090a0;
            line-height: 1.6
        }

        .info-panel h3 {
            font-size: .85rem;
            color: #ffd700;
            margin-bottom: 8px
        }

        .planet-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 4px;
            border-bottom: 1px solid rgba(255, 215, 0, .06);
            cursor: pointer;
            border-radius: 6px;
            transition: background .2s
        }

        .planet-info:hover,
        .planet-info.active {
            background: rgba(255, 215, 0, .06)
        }

        .planet-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0
        }

        .planet-name {
            font-weight: 600;
            color: #c0c0d0;
            flex: 1
        }

        .planet-dist {
            font-family: 'JetBrains Mono', monospace;
            color: #ffd700;
            font-size: .65rem
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 14px;
            align-items: center;
            background: rgba(2, 2, 16, .8);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, .1);
            z-index: 20;
            flex-wrap: wrap;
            justify-content: center
        }

        .controls label {
            font-size: .75rem;
            color: #7088aa;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap
        }

        .controls input[type=range] {
            -webkit-appearance: none;
            width: 80px;
            height: 3px;
            border-radius: 2px;
            background: linear-gradient(90deg, #ffd700, #ff4500);
            outline: none
        }

        .controls input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 6px rgba(255, 215, 0, .6);
            cursor: pointer
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 215, 0, .15);
            color: #a0a0a0;
            font-family: inherit;
            font-size: .72rem;
            font-weight: 600;
            padding: 5px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all .25s
        }

        .ctrl-btn:hover,
        .ctrl-btn.on {
            background: linear-gradient(135deg, rgba(255, 215, 0, .15), rgba(255, 69, 0, .1));
            border-color: rgba(255, 215, 0, .4);
            color: #fff
        }

        .hint {
            position: fixed;
            top: 58px;
            left: 50%;
            transform: translateX(-50%);
            font-size: .72rem;
            color: rgba(180, 170, 130, .35);
            z-index: 20;
            text-align: center;
            pointer-events: none
        }

        .fps {
            position: fixed;
            top: 16px;
            right: 28px;
            font-family: 'JetBrains Mono', monospace;
            font-size: .7rem;
            color: rgba(255, 215, 0, .25);
            z-index: 20;
            pointer-events: none
        }

        .tooltip {
            position: fixed;
            z-index: 30;
            background: rgba(10, 10, 30, .9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 215, 0, .2);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: .75rem;
            display: none;
            max-width: 220px;
            pointer-events: none
        }

        .tooltip h4 {
            color: #ffd700;
            margin-bottom: 4px
        }

        .tooltip .t-stat {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            color: #8090b0;
            padding: 2px 0
        }

        .tooltip .t-val {
            color: #fff;
            font-family: 'JetBrains Mono', monospace
        }

        @media(max-width:860px) {
            .info-panel {
                display: none
            }
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>

    <div class="topbar">
        <h1>☀️ HỆ MẶT TRỜI</h1>
    </div>
    <p class="hint">Kéo chuột để xoay &bull; Cuộn để zoom &bull; Click hành tinh để xem chi tiết</p>
    <div class="fps" id="fps">60 FPS</div>

    <div class="info-panel" id="infoPanel">
        <h3>🪐 Hành Tinh</h3>
        <div id="planetList"></div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <div class="controls">
        <label>Tốc độ <input type="range" id="rSpeed" min="0.1" max="20" step="0.1" value="2"></label>
        <label>Zoom <input type="range" id="rZoom" min="0.5" max="8" step="0.1" value="1.5"></label>
        <button class="ctrl-btn on" id="toggleOrbits">Quỹ đạo</button>
        <button class="ctrl-btn on" id="toggleLabels">Nhãn</button>
        <button class="ctrl-btn on" id="toggleTrails">Vệt sáng</button>
        <button class="ctrl-btn" id="toggleRealistic">Tỷ lệ thực</button>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth * devicePixelRatio;
            canvas.height = window.innerHeight * devicePixelRatio;
            ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
        }
        resize();
        window.addEventListener('resize', resize);

        // ═══════════════════════════
        //  PLANET DATA (real ratios)
        // ═══════════════════════════
        const planets = [
            { name: 'Sao Thủy', nameEn: 'Mercury', dist: 0.39, period: 0.24, radius: 2.4, color: '#b0a090', moons: 0, mass: '0.055 M⊕', temp: '167°C', fact: 'Hành tinh nhỏ nhất, không có khí quyển' },
            { name: 'Sao Kim', nameEn: 'Venus', dist: 0.72, period: 0.62, radius: 3.8, color: '#e8c870', moons: 0, mass: '0.815 M⊕', temp: '464°C', fact: 'Nóng nhất do hiệu ứng nhà kính cực độ' },
            { name: 'Trái Đất', nameEn: 'Earth', dist: 1.00, period: 1.00, radius: 4.0, color: '#4488ff', moons: 1, mass: '1.0 M⊕', temp: '15°C', fact: 'Hành tinh duy nhất có sự sống đã biết' },
            { name: 'Sao Hỏa', nameEn: 'Mars', dist: 1.52, period: 1.88, radius: 3.2, color: '#dd6644', moons: 2, mass: '0.107 M⊕', temp: '−65°C', fact: 'Có núi lửa cao nhất: Olympus Mons (21.9km)' },
            { name: 'Sao Mộc', nameEn: 'Jupiter', dist: 5.20, period: 11.86, radius: 11, color: '#ddaa77', moons: 95, mass: '317.8 M⊕', temp: '−110°C', fact: 'Hành tinh lớn nhất, Vết Đỏ Lớn rộng hơn Trái Đất' },
            { name: 'Sao Thổ', nameEn: 'Saturn', dist: 9.54, period: 29.46, radius: 9.5, color: '#e8d090', moons: 146, mass: '95.2 M⊕', temp: '−140°C', fact: 'Mật độ thấp đến mức nổi trên nước' },
            { name: 'Thiên Vương', nameEn: 'Uranus', dist: 19.2, period: 84.01, radius: 6.5, color: '#88ccdd', moons: 28, mass: '14.5 M⊕', temp: '−195°C', fact: 'Nghiêng 98° — quay "nằm ngang"' },
            { name: 'Hải Vương', nameEn: 'Neptune', dist: 30.1, period: 164.8, radius: 6.2, color: '#4466dd', moons: 16, mass: '17.1 M⊕', temp: '−200°C', fact: 'Gió mạnh nhất: 2,100 km/h' },
        ];

        // Asteroid belt
        const NUM_ASTEROIDS = 300;
        const asteroids = [];
        for (let i = 0; i < NUM_ASTEROIDS; i++) {
            asteroids.push({
                dist: 2.2 + Math.random() * 1.3,
                angle: Math.random() * Math.PI * 2,
                speed: 0.15 + Math.random() * 0.1,
                size: 0.3 + Math.random() * 1,
                brightness: 0.2 + Math.random() * 0.5,
            });
        }

        // Background stars
        const bgStars = [];
        for (let i = 0; i < 1500; i++) {
            bgStars.push({
                x: Math.random(), y: Math.random(),
                r: 0.2 + Math.random() * 1.2,
                a: 0.3 + Math.random() * 0.7,
                tw: 0.5 + Math.random() * 2,
                tp: Math.random() * 6.28,
            });
        }

        // State
        let timeScale = 2;
        let zoom = 1.5;
        let showOrbits = true, showLabels = true, showTrails = true, realisticScale = false;
        let rotX = -0.5, rotZ = 0;
        let dragging = false, lastMX = 0, lastMY = 0;
        let simTime = 0;
        let selectedPlanet = -1;
        let hoveredPlanet = -1;

        // Trail history per planet
        const trailMax = 200;
        const trailData = planets.map(() => []);

        // Input
        canvas.addEventListener('mousedown', e => { dragging = true; lastMX = e.clientX; lastMY = e.clientY; });
        window.addEventListener('mouseup', () => dragging = false);
        window.addEventListener('mousemove', e => {
            if (dragging) {
                rotZ += (e.clientX - lastMX) * 0.004;
                rotX += (e.clientY - lastMY) * 0.004;
                rotX = Math.max(-1.5, Math.min(0.1, rotX));
                lastMX = e.clientX; lastMY = e.clientY;
            }
            checkHover(e.clientX, e.clientY);
        });
        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            zoom = Math.max(0.3, Math.min(10, zoom + e.deltaY * -0.002));
            document.getElementById('rZoom').value = zoom;
        }, { passive: false });

        canvas.addEventListener('click', e => {
            if (hoveredPlanet >= 0) {
                selectedPlanet = selectedPlanet === hoveredPlanet ? -1 : hoveredPlanet;
            }
        });

        canvas.addEventListener('touchstart', e => {
            if (e.touches.length === 1) { dragging = true; lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY; }
        });
        window.addEventListener('touchend', () => dragging = false);
        window.addEventListener('touchmove', e => {
            if (!dragging || e.touches.length !== 1) return;
            rotZ += (e.touches[0].clientX - lastMX) * 0.004;
            rotX += (e.touches[0].clientY - lastMY) * 0.004;
            rotX = Math.max(-1.5, Math.min(0.1, rotX));
            lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
        });

        // Controls
        document.getElementById('rSpeed').oninput = e => timeScale = +e.target.value;
        document.getElementById('rZoom').oninput = e => zoom = +e.target.value;
        function toggleBtn(id, get, set) { const el = document.getElementById(id); el.addEventListener('click', () => { set(!get()); el.classList.toggle('on', get()); }) }
        toggleBtn('toggleOrbits', () => showOrbits, v => showOrbits = v);
        toggleBtn('toggleLabels', () => showLabels, v => showLabels = v);
        toggleBtn('toggleTrails', () => showTrails, v => showTrails = v);
        toggleBtn('toggleRealistic', () => realisticScale, v => realisticScale = v);

        // Planet list
        const listEl = document.getElementById('planetList');
        planets.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = 'planet-info';
            div.innerHTML = `<span class="planet-dot" style="background:${p.color}"></span>
    <span class="planet-name">${p.name}</span>
    <span class="planet-dist">${p.dist} AU</span>`;
            div.onclick = () => { selectedPlanet = selectedPlanet === i ? -1 : i; };
            listEl.appendChild(div);
        });

        // 3D projection
        function project(x, y, z) {
            const cz = Math.cos(rotZ), sz = Math.sin(rotZ);
            const rx = x * cz - y * sz, ry = x * sz + y * cz;
            const cx = Math.cos(rotX), sx = Math.sin(rotX);
            const ry2 = ry * cx - z * sx, rz2 = ry * sx + z * cx;
            return [rx, ry2, rz2];
        }

        // Hover detection
        let planetScreenPos = [];
        function checkHover(mx, my) {
            hoveredPlanet = -1;
            for (let i = 0; i < planetScreenPos.length; i++) {
                const [px, py, pr] = planetScreenPos[i];
                const dx = mx - px, dy = my - py;
                if (dx * dx + dy * dy < (pr + 10) * (pr + 10)) {
                    hoveredPlanet = i;
                    break;
                }
            }
            canvas.style.cursor = hoveredPlanet >= 0 ? 'pointer' : 'default';

            // Tooltip
            const tt = document.getElementById('tooltip');
            if (hoveredPlanet >= 0) {
                const p = planets[hoveredPlanet];
                tt.innerHTML = `<h4>${p.name} (${p.nameEn})</h4>
      <div class="t-stat"><span>Khoảng cách</span><span class="t-val">${p.dist} AU</span></div>
      <div class="t-stat"><span>Chu kỳ</span><span class="t-val">${p.period} năm</span></div>
      <div class="t-stat"><span>Khối lượng</span><span class="t-val">${p.mass}</span></div>
      <div class="t-stat"><span>Nhiệt độ TB</span><span class="t-val">${p.temp}</span></div>
      <div class="t-stat"><span>Vệ tinh</span><span class="t-val">${p.moons}</span></div>
      <div style="margin-top:6px;color:#aab0cc;font-size:.7rem">💡 ${p.fact}</div>`;
                tt.style.display = 'block';
                tt.style.left = Math.min(mx + 15, window.innerWidth - 240) + 'px';
                tt.style.top = (my - 60) + 'px';
            } else {
                tt.style.display = 'none';
            }
        }

        // FPS
        let fpsF = 0, fpsL = performance.now(), fpsD = 60;
        let lastTime = 0;

        function render(time) {
            requestAnimationFrame(render);
            const dt = Math.min((time - lastTime) / 1000, 0.05);
            lastTime = time;
            simTime += dt * timeScale;

            fpsF++;
            if (time - fpsL > 500) { fpsD = Math.round(fpsF / ((time - fpsL) / 1000)); fpsF = 0; fpsL = time; document.getElementById('fps').textContent = fpsD + ' FPS'; }

            const W = window.innerWidth, H = window.innerHeight;
            const cx = W / 2, cy = H / 2;
            const baseScale = Math.min(W, H) * 0.012 * zoom;
            const sizeScale = realisticScale ? 0.15 : 1;

            // Clear
            ctx.fillStyle = '#020210';
            ctx.fillRect(0, 0, W, H);

            // Background stars
            for (const s of bgStars) {
                const tw = 0.7 + 0.3 * Math.sin(time * 0.001 * s.tw + s.tp);
                ctx.beginPath();
                ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${(s.a * tw).toFixed(2)})`;
                ctx.fill();
            }

            // ── Sun ──
            const [sx, sy] = project(0, 0, 0);
            const sunX = cx + sx * baseScale, sunY = cy + sy * baseScale;
            const sunR = (realisticScale ? 3 : 18) * zoom;

            // Sun glow
            const sunGlow = ctx.createRadialGradient(sunX, sunY, sunR * 0.5, sunX, sunY, sunR * 6);
            sunGlow.addColorStop(0, 'rgba(255,230,100,0.4)');
            sunGlow.addColorStop(0.3, 'rgba(255,180,50,0.12)');
            sunGlow.addColorStop(0.6, 'rgba(255,100,0,0.03)');
            sunGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = sunGlow;
            ctx.beginPath();
            ctx.arc(sunX, sunY, sunR * 6, 0, Math.PI * 2);
            ctx.fill();

            // Sun body
            const sunBody = ctx.createRadialGradient(sunX - sunR * 0.2, sunY - sunR * 0.2, 0, sunX, sunY, sunR);
            sunBody.addColorStop(0, '#fff');
            sunBody.addColorStop(0.3, '#ffd700');
            sunBody.addColorStop(0.7, '#ff8c00');
            sunBody.addColorStop(1, '#ff4500');
            ctx.fillStyle = sunBody;
            ctx.beginPath();
            ctx.arc(sunX, sunY, sunR, 0, Math.PI * 2);
            ctx.fill();

            // ── Orbits & Planets ──
            planetScreenPos = [];

            // Draw orbits first
            if (showOrbits) {
                for (const p of planets) {
                    const orbitR = p.dist * baseScale * 30;
                    ctx.beginPath();
                    // Project orbit ellipse
                    for (let a = 0; a <= Math.PI * 2; a += 0.05) {
                        const ox = Math.cos(a) * p.dist * 30;
                        const oy = Math.sin(a) * p.dist * 30;
                        const [px, py] = project(ox, oy, 0);
                        const sx = cx + px * baseScale, sy = cy + py * baseScale;
                        if (a === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
                    }
                    ctx.closePath();
                    ctx.strokeStyle = `rgba(255,255,255,0.06)`;
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }
            }

            // Asteroid belt
            for (const a of asteroids) {
                a.angle += (a.speed / a.dist) * dt * timeScale * 0.5;
                const ax = Math.cos(a.angle) * a.dist * 30;
                const ay = Math.sin(a.angle) * a.dist * 30;
                const [px, py] = project(ax, ay, 0);
                const sx = cx + px * baseScale, sy = cy + py * baseScale;
                ctx.beginPath();
                ctx.arc(sx, sy, a.size * zoom * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(150,140,120,${a.brightness * 0.3})`;
                ctx.fill();
            }

            // Draw planets (sorted by depth)
            const planetRender = planets.map((p, i) => {
                const angle = (simTime / p.period) * Math.PI * 2;
                const px3 = Math.cos(angle) * p.dist * 30;
                const py3 = Math.sin(angle) * p.dist * 30;
                const [px, py, pz] = project(px3, py3, 0);
                return { p, i, sx: cx + px * baseScale, sy: cy + py * baseScale, pz, angle };
            }).sort((a, b) => a.pz - b.pz);

            for (const { p, i, sx: psx, sy: psy } of planetRender) {
                const r = p.radius * sizeScale * zoom * 0.5;

                // Trail
                if (showTrails) {
                    trailData[i].push([psx, psy]);
                    if (trailData[i].length > trailMax) trailData[i].shift();
                    for (let t = 1; t < trailData[i].length; t++) {
                        const alpha = (t / trailData[i].length) * 0.3;
                        ctx.beginPath();
                        ctx.moveTo(trailData[i][t - 1][0], trailData[i][t - 1][1]);
                        ctx.lineTo(trailData[i][t][0], trailData[i][t][1]);
                        ctx.strokeStyle = p.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
                        ctx.strokeStyle = `${p.color}${Math.round(alpha * 255).toString(16).padStart(2, '0')}`;
                        ctx.lineWidth = r * 0.4;
                        ctx.stroke();
                    }
                }

                // Planet glow
                const glow = ctx.createRadialGradient(psx, psy, r * 0.5, psx, psy, r * 3);
                glow.addColorStop(0, p.color + '30');
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(psx, psy, r * 3, 0, Math.PI * 2);
                ctx.fill();

                // Planet body
                const body = ctx.createRadialGradient(psx - r * 0.3, psy - r * 0.3, 0, psx, psy, r);
                body.addColorStop(0, '#fff');
                body.addColorStop(0.4, p.color);
                body.addColorStop(1, '#222');
                ctx.fillStyle = body;
                ctx.beginPath();
                ctx.arc(psx, psy, Math.max(2, r), 0, Math.PI * 2);
                ctx.fill();

                // Saturn rings
                if (p.nameEn === 'Saturn') {
                    ctx.beginPath();
                    ctx.ellipse(psx, psy, r * 2.2, r * 0.6, 0.3, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(232,208,144,0.4)';
                    ctx.lineWidth = r * 0.4;
                    ctx.stroke();
                }

                // Label
                if (showLabels) {
                    ctx.font = `${Math.max(9, 11 * zoom * 0.5)}px Outfit, sans-serif`;
                    ctx.fillStyle = selectedPlanet === i ? '#ffd700' : 'rgba(200,200,220,0.6)';
                    ctx.textAlign = 'center';
                    ctx.fillText(p.name, psx, psy - r - 6);
                }

                // Highlight selected
                if (selectedPlanet === i) {
                    ctx.beginPath();
                    ctx.arc(psx, psy, r + 6, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255,215,0,0.4)';
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([4, 4]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                planetScreenPos.push([psx, psy, r]);
            }

            // Time display
            ctx.fillStyle = 'rgba(200,200,220,0.3)';
            ctx.font = '11px JetBrains Mono, monospace';
            ctx.textAlign = 'left';
            const years = (simTime).toFixed(1);
            ctx.fillText(`T = ${years} năm Trái Đất`, 14, H - 12);
        }

        requestAnimationFrame(render);
    </script>
</body>

</html>
